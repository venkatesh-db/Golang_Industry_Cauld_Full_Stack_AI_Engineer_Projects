name: go-observability-lab

x-service-common: &service-common
  restart: unless-stopped
  read_only: true
  tmpfs:
    - /tmp
  security_opt:
    - no-new-privileges:true
  environment: &service-environment
    DEPLOYMENT_ENVIRONMENT: local-lab
    DIAGNOSTICS_TOKEN: ${DIAGNOSTICS_TOKEN:-local-diagnostics-token}
    FAILURE_LAB_ENABLED: ${FAILURE_LAB_ENABLED:-true}
    FAILURE_LAB_TOKEN: ${FAILURE_LAB_TOKEN:-local-failure-lab-token}
    OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
    TRACE_SAMPLING_RATIO: ${TRACE_SAMPLING_RATIO:-1}
    ACCESS_LOG_SAMPLE_RATIO: ${ACCESS_LOG_SAMPLE_RATIO:-1}
  deploy:
    resources:
      limits:
        cpus: "1.0"
        memory: 256M

services:
  feed-api:
    <<: *service-common
    build:
      context: .
      args:
        SERVICE: feed-api
    environment:
      <<: *service-environment
      LISTEN_ADDR: :8080
      DATABASE_URL: postgres://observability:observability@postgres:5432/observability?sslmode=disable
      POSTGRES_MAX_CONNS: 10
      REDIS_ADDR: redis:6379
      REDIS_POOL_SIZE: 20
      RECOMMENDATION_URL: http://recommendation-service:8081
      PROFILE_URL: http://profile-service:8082
    ports:
      - "127.0.0.1:18080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      recommendation-service:
        condition: service_healthy
      profile-service:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/readyz"]
      interval: 5s
      timeout: 2s
      retries: 20
      start_period: 10s

  recommendation-service:
    <<: *service-common
    build:
      context: .
      args:
        SERVICE: recommendation-service
    environment:
      <<: *service-environment
      LISTEN_ADDR: :8081
      REDIS_ADDR: redis:6379
      REDIS_POOL_SIZE: 20
    ports:
      - "127.0.0.1:18081:8081"
    depends_on:
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8081/readyz"]
      interval: 5s
      timeout: 2s
      retries: 20
      start_period: 10s

  profile-service:
    <<: *service-common
    build:
      context: .
      args:
        SERVICE: profile-service
    environment:
      <<: *service-environment
      LISTEN_ADDR: :8082
      DATABASE_URL: postgres://observability:observability@postgres:5432/observability?sslmode=disable
      POSTGRES_MAX_CONNS: 10
    ports:
      - "127.0.0.1:18082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8082/readyz"]
      interval: 5s
      timeout: 2s
      retries: 20
      start_period: 10s

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: observability
      POSTGRES_USER: observability
      POSTGRES_PASSWORD: observability
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deploy/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U observability -d observability"]
      interval: 5s
      timeout: 3s
      retries: 20
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    security_opt:
      - no-new-privileges:true

  prometheus:
    image: prom/prometheus:v3.5.0
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
      - --enable-feature=exemplar-storage
    ports:
      - "127.0.0.1:19090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      feed-api:
        condition: service_healthy
      recommendation-service:
        condition: service_healthy
      profile-service:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true

  tempo:
    image: grafana/tempo:2.8.2
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo.yml"]
    ports:
      - "127.0.0.1:13200:3200"
    volumes:
      - ./deploy/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    security_opt:
      - no-new-privileges:true

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.135.0
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yml"]
    volumes:
      - ./deploy/otel-collector/config.yml:/etc/otelcol-contrib/config.yml:ro
    depends_on:
      - tempo
    security_opt:
      - no-new-privileges:true

  grafana:
    image: grafana/grafana:12.1.1
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    ports:
      - "127.0.0.1:13000:3000"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - tempo
    security_opt:
      - no-new-privileges:true

  k6:
    image: grafana/k6:0.54.0
    profiles: ["loadtest"]
    environment:
      BASE_URL: http://feed-api:8080
    volumes:
      - ./loadtest:/scripts:ro
    entrypoint: ["k6"]
    command: ["run", "/scripts/feed.js"]
    depends_on:
      feed-api:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  tempo-data:
  grafana-data:
