global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: edge-api
    static_configs:
      - targets: ["edge-api:8080"]
  - job_name: feed-service
    static_configs:
      - targets: ["feed-service:8081"]
  - job_name: counter-service
    static_configs:
      - targets: ["counter-service:8082"]
