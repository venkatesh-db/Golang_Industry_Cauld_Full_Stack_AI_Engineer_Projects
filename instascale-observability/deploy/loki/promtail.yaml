server:
  http_listen_port: 9080
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Tail all container stdout/stderr via the Docker service-discovery.
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service
    pipeline_stages:
      # Parse the Go slog JSON so trace_id becomes a queryable label -> the
      # Loki->Tempo pivot that powers "log line to trace in <=2 clicks".
      - json:
          expressions:
            trace_id: trace_id
            level: level
            svc: service
      - labels:
          trace_id:
          level:
