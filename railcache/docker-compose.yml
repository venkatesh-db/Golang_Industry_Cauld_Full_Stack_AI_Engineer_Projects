services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: railcache
      POSTGRES_PASSWORD: railcache
      POSTGRES_DB: railcache
    ports:
      - "5433:5432"   # 5433 on host to avoid a native Postgres already on 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U railcache"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    # maxmemory + LRU eviction is mandatory for a cache: every key carries a TTL,
    # and a bounded memory ceiling turns a key-cardinality attack into evictions
    # instead of an OOM. Never run a cache with unlimited memory.
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6380:6379"   # 6380 on host to avoid a local Redis already on 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      HTTP_ADDR: ":8080"
      ADMIN_ADDR: ":9090"
      DATABASE_URL: "postgres://railcache:railcache@postgres:5432/railcache?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      ADMIN_TOKEN: "${ADMIN_TOKEN:-dev-admin-token}"
    ports:
      - "8080:8080"      # public
      # 9090 (admin/metrics/pprof) intentionally NOT published — internal only
    profiles: ["full"]   # `docker compose --profile full up` to run the app in a container too
