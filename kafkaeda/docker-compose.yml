services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rapido
      POSTGRES_USER: rapido
      POSTGRES_PASSWORD: rapido
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rapido -d rapido"]
      interval: 3s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  kafka:
    image: apache/kafka:3.9.2
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: CONTROLLER://:9093,PLAINTEXT://:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 5s
      timeout: 5s
      retries: 30

  migrate:
    build: .
    environment: &app-env
      DATABASE_URL: postgres://rapido:rapido@postgres:5432/rapido?sslmode=disable
      KAFKA_BROKERS: kafka:9092
    command: ["migrate"]
    depends_on:
      postgres:
        condition: service_healthy

  ride-api:
    build: .
    environment:
      <<: *app-env
      HTTP_ADDR: :8080
    command: ["ride-api"]
    ports:
      - "8091:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully

  driver-api:
    build: .
    environment:
      <<: *app-env
      HTTP_ADDR: :8081
    command: ["driver-api"]
    ports:
      - "8081:8081"
    depends_on:
      migrate:
        condition: service_completed_successfully

  outbox-relay:
    build: .
    environment: *app-env
    command: ["outbox-relay"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy

  dispatch-service:
    build: .
    environment: *app-env
    command: ["dispatch-service"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy

  ride-projection:
    build: .
    environment: *app-env
    command: ["ride-projection"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy

  activity-service:
    build: .
    environment: *app-env
    command: ["activity-service"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy

volumes:
  postgres-data:
